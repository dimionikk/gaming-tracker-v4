version: "3.9"

services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-steam:
    image: postgres:16
    environment:
      POSTGRES_DB: steam_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_steam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    env_file: .env
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"

  user-service:
    build: ./user-service
    env_file: .env
    depends_on:
      postgres-user:
        condition: service_healthy
    ports:
      - "8002:8001"

  steam-service:
    build: ./steam-service
    env_file: .env
    depends_on:
      postgres-steam:
        condition: service_healthy
    ports:
      - "8003:8003"

  api-gateway:
    build: ./api-gateway
    env_file: .env
    depends_on:
      - auth-service
      - user-service
    ports:
      - "8000:8000"

  postgres-timer:
    image: postgres:16
    environment:
      POSTGRES_DB: timer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_timer_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-stats:
    image: postgres:16
    environment:
      POSTGRES_DB: stats_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_stats_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  timer-service:
    build: ./timer-service
    env_file: .env
    depends_on:
      postgres-timer:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8004:8004"

  stats-service:
    build: ./stats-service
    env_file: .env
    depends_on:
      postgres-stats:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8005:8005"

  postgres-friend:
    image: postgres:16
    environment:
      POSTGRES_DB: friend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_friend_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-activity:
    image: postgres:16
    environment:
      POSTGRES_DB: activity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_activity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-leaderboard:
    image: postgres:16
    environment:
      POSTGRES_DB: leaderboard_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_leaderboard_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  friend-service:
    build: ./friend-service
    env_file: .env
    depends_on:
      postgres-friend:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8006:8006"

  activity-service:
    build: ./activity-service
    env_file: .env
    depends_on:
      postgres-activity:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8007:8007"

  leaderboard-service:
    build: ./leaderboard-service
    env_file: .env
    depends_on:
      postgres-leaderboard:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8008:8008"

  postgres-chat:
    image: postgres:16
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_chat_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chat-service:
    build: ./chat-service
    env_file: .env
    depends_on:
      postgres-chat:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8009:8009"

volumes:
  postgres_auth_data:
  postgres_user_data:
  postgres_steam_data:
  postgres_timer_data:
  postgres_stats_data:
  postgres_friend_data:
  postgres_activity_data:
  postgres_leaderboard_data:
  postgres_chat_data:
