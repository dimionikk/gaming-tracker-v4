version: "3.9"

services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-steam:
    image: postgres:16
    environment:
      POSTGRES_DB: steam_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_steam_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    env_file: .env
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"

  user-service:
    build: ./user-service
    env_file: .env
    depends_on:
      postgres-user:
        condition: service_healthy
    ports:
      - "8002:8001"

  steam-service:
    build: ./steam-service
    env_file: .env
    depends_on:
      postgres-steam:
        condition: service_healthy
    ports:
      - "8003:8003"

  api-gateway:
    build: ./api-gateway
    env_file: .env
    depends_on:
      - auth-service
      - user-service
    ports:
      - "8000:8000"

volumes:
  postgres_auth_data:
  postgres_user_data:
  postgres_steam_data: